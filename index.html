<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Budget">
<meta name="theme-color" content="#4A154B">
<title>Budget</title>
<style>
  :root {
    --purple:#4A154B; --purple-light:#6B2270; --purple-soft:#F6F0F6;
    --red:#E53935; --green:#43A047; --amber:#F4A623;
    --bg:#FAFAFC; --card:#FFFFFF; --border:#EAEAEF;
    --text:#1A1A2E; --muted:#6B6B7D;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-size:15px; line-height:1.4;
    padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom); }
  .app { max-width: 520px; margin: 0 auto; padding: 14px; }

  header {
    background: linear-gradient(135deg, var(--purple), var(--purple-light));
    color: white; padding: 18px 16px 22px; border-radius: 16px;
    box-shadow: 0 6px 20px rgba(74,21,75,0.18);
    margin-bottom: 14px;
  }
  header .title { font-size:13px; opacity:.85; letter-spacing:.5px; text-transform:uppercase; }
  header .month { font-size:22px; font-weight:700; margin-top:2px; }
  header .total { font-size:34px; font-weight:800; margin-top:10px; }
  header .of-budget { font-size:13px; opacity:.85; margin-top:2px; }
  header .status-pill {
    display:inline-block; padding:3px 10px; border-radius:999px;
    font-size:11px; font-weight:700; margin-top:10px;
    background:rgba(255,255,255,.18);
  }
  header .status-pill.over { background:#E53935; }

  .bar-outer { background:rgba(255,255,255,.22); height:8px; border-radius:4px; margin-top:12px; overflow:hidden; }
  .bar-inner { background:white; height:100%; border-radius:4px; transition:width .5s ease; }

  .tabs { display:flex; gap:6px; margin-bottom:12px; }
  .tab { flex:1; padding:10px; text-align:center; font-size:13px; font-weight:600;
    background:var(--card); border:1px solid var(--border); border-radius:10px;
    color:var(--muted); cursor:pointer; transition:all .15s; }
  .tab.active { background:var(--purple); color:white; border-color:var(--purple); }

  .card { background:var(--card); border:1px solid var(--border);
    border-radius:14px; padding:12px 14px; margin-bottom:10px; }
  .row { display:flex; justify-content:space-between; align-items:center; gap:10px; }
  .row .name { font-weight:600; font-size:14px; }
  .row .bucket { font-size:11px; color:var(--muted); margin-top:2px; }
  .row .amounts { text-align:right; font-variant-numeric: tabular-nums; }
  .row .spent { font-weight:700; font-size:15px; }
  .row .budget { font-size:12px; color:var(--muted); }

  .cat-bar { height:6px; background:#EEE; border-radius:3px; margin-top:10px; overflow:hidden; }
  .cat-bar > span { display:block; height:100%; border-radius:3px; transition:width .4s; }
  .bar-good { background:var(--green); }
  .bar-warn { background:var(--amber); }
  .bar-bad { background:var(--red); }

  .status-badge { display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:999px; }
  .badge-over { background:#FDECEA; color:var(--red); }
  .badge-under { background:#E6F4EA; color:var(--green); }
  .badge-par { background:#FFF5E0; color:var(--amber); }
  .badge-none { background:#EEE; color:var(--muted); }

  .bucket-group { margin-bottom:16px; }
  .bucket-group h3 {
    font-size:11px; text-transform:uppercase; letter-spacing:1px;
    color:var(--muted); margin:6px 4px 8px; font-weight:700;
  }

  .refresh {
    background:var(--purple); color:white; border:none; border-radius:999px;
    padding:10px 18px; font-size:14px; font-weight:600;
    display:flex; align-items:center; gap:8px; margin: 4px auto 12px;
    box-shadow:0 4px 12px rgba(74,21,75,.25); cursor:pointer;
  }
  .refresh:active { transform:scale(.97); }
  .setup { background:#FFF9E6; border:1px solid #F4E1A0; color:#7A5B00;
    padding:14px; border-radius:12px; margin-bottom:12px; font-size:13px; line-height:1.5; }
  .setup b { color:#4A154B; }
  .muted { color:var(--muted); font-size:12px; text-align:center; padding:12px 0; }
  .err { background:#FDECEA; color:var(--red); padding:10px; border-radius:8px; font-size:13px; }

  .tips-card .tip { display:flex; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); font-size:13px; line-height:1.5; }
  .tips-card .tip:last-child { border-bottom:none; }
  .tips-card .tip .emoji { flex-shrink:0; }
</style>
</head>
<body>
<div class="app">

  <div id="setup" class="setup" style="display:none">
    <b>One-time setup</b><br>
    To load live data, paste your Google Sheet's <b>public CSV link</b> below.
    In your Sheet: File → Share → Publish to web → select the <b>Dashboard Data</b> tab → format <b>CSV</b> → copy the link.
    <input id="csvurl" type="url" placeholder="https://docs.google.com/..."
      style="width:100%;margin-top:8px;padding:8px;border:1px solid var(--border);border-radius:6px;font-size:12px">
    <button onclick="saveUrl()" style="margin-top:6px;background:var(--purple);color:white;border:none;padding:8px 14px;border-radius:6px;font-weight:600">Save</button>
  </div>

  <header id="header">
    <div class="title">Month-to-date</div>
    <div class="month" id="month">—</div>
    <div class="total" id="total">$0</div>
    <div class="of-budget" id="of-budget">of $0 budget</div>
    <div class="bar-outer"><div class="bar-inner" id="total-bar" style="width:0"></div></div>
    <span class="status-pill" id="status-pill">On track</span>
  </header>

  <button class="refresh" onclick="load()" id="refresh">
    <span id="refresh-icon">↻</span> <span>Refresh</span>
  </button>

  <div class="tabs">
    <div class="tab active" data-view="cats" onclick="switchView('cats')">By Category</div>
    <div class="tab" data-view="buckets" onclick="switchView('buckets')">By Bucket</div>
    <div class="tab" data-view="tips" onclick="switchView('tips')">💡 Tips</div>
  </div>

  <div id="content"></div>

  <div class="muted" id="lastupdated"></div>
</div>

<script>
const KEY = 'budget_csv_url';

function saveUrl() {
  const v = document.getElementById('csvurl').value.trim();
  if (!v) return;
  localStorage.setItem(KEY, v);
  document.getElementById('setup').style.display = 'none';
  load();
}

function getUrl() {
  return localStorage.getItem(KEY);
}

let DATA = [];

async function load() {
  const url = getUrl();
  if (!url) {
    document.getElementById('setup').style.display = 'block';
    return;
  }
  const btn = document.getElementById('refresh-icon');
  btn.style.animation = 'spin .6s linear';
  btn.style.display = 'inline-block';
  try {
    const res = await fetch(url + '&ts=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    DATA = parseCsv(text);
    render();
    document.getElementById('lastupdated').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('content').innerHTML =
      '<div class="err">Could not load data: ' + e.message + '<br>Check the CSV URL and make sure the Sheet is published.</div>';
  }
  setTimeout(() => { btn.style.animation = ''; }, 600);
}

// Minimal CSV parser — handles quoted fields & embedded commas
function parseCsv(text) {
  const rows = [];
  const lines = text.replace(/\r/g, '').split('\n');
  for (const line of lines) {
    if (!line.trim()) continue;
    const cells = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (inQ) {
        if (ch === '"' && line[i+1] === '"') { cur += '"'; i++; }
        else if (ch === '"') inQ = false;
        else cur += ch;
      } else {
        if (ch === ',') { cells.push(cur); cur = ''; }
        else if (ch === '"') inQ = true;
        else cur += ch;
      }
    }
    cells.push(cur);
    rows.push(cells);
  }

  // Find the header row (contains "Category","Spent","Budget")
  let hdrIdx = -1;
  for (let i = 0; i < rows.length; i++) {
    const r = rows[i].map(c => c.trim().toLowerCase());
    if (r.includes('category') && r.includes('spent') && r.includes('budget')) {
      hdrIdx = i; break;
    }
  }
  if (hdrIdx < 0) return [];

  const hdr = rows[hdrIdx].map(c => c.trim().toLowerCase());
  const out = [];
  for (let i = hdrIdx + 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r[0] || !r[0].trim()) continue;
    const rec = {};
    hdr.forEach((h, j) => rec[h] = r[j] || '');
    rec.spent = parseFloat((rec.spent || '0').replace(/[$,]/g, '')) || 0;
    rec.budget = parseFloat((rec.budget || '0').replace(/[$,]/g, '')) || 0;
    rec.pct = rec.budget > 0 ? rec.spent / rec.budget : 0;
    out.push(rec);
  }
  return out;
}

function render() {
  // Header totals
  const total = DATA.reduce((a, d) => a + d.spent, 0);
  const budget = DATA.reduce((a, d) => a + d.budget, 0);
  const pct = budget > 0 ? total / budget : 0;

  const now = new Date();
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('month').textContent = months[now.getMonth()] + ' ' + now.getFullYear();
  document.getElementById('total').textContent = fmtDollars(total);
  document.getElementById('of-budget').textContent = 'of ' + fmtDollars(budget) + ' budget';
  document.getElementById('total-bar').style.width = Math.min(100, pct * 100) + '%';
  const pill = document.getElementById('status-pill');
  if (pct > 1) { pill.className = 'status-pill over'; pill.textContent = 'Over budget by ' + fmtDollars(total - budget); }
  else if (pct > 0.9) { pill.className = 'status-pill'; pill.textContent = 'Close to budget (' + Math.round(pct*100) + '%)'; }
  else { pill.className = 'status-pill'; pill.textContent = 'On track (' + Math.round(pct*100) + '%)'; }

  // Current view
  const view = document.querySelector('.tab.active').dataset.view;
  if (view === 'cats') renderCategories();
  else if (view === 'buckets') renderBuckets();
  else renderTips();
}

function renderCategories() {
  const content = document.getElementById('content');
  const sorted = [...DATA].sort((a, b) => b.spent - a.spent);
  content.innerHTML = sorted.map(d => {
    const barW = Math.min(100, d.pct * 100);
    const cls = d.pct > 1 ? 'bar-bad' : d.pct > 0.8 ? 'bar-warn' : 'bar-good';
    const badge = d.spent === 0 && d.budget > 0 ? '<span class="status-badge badge-none">no spend</span>'
                : d.pct > 1 ? '<span class="status-badge badge-over">OVER</span>'
                : d.pct < 0.99 && d.pct > 0 ? '<span class="status-badge badge-under">' + Math.round(d.pct*100) + '%</span>'
                : d.pct === 0 ? '' : '<span class="status-badge badge-par">at par</span>';
    return `
      <div class="card">
        <div class="row">
          <div>
            <div class="name">${escapeHtml(d.category)} ${badge}</div>
            <div class="bucket">${escapeHtml(d.bucket || '')}</div>
          </div>
          <div class="amounts">
            <div class="spent">${fmtDollars(d.spent)}</div>
            <div class="budget">/ ${fmtDollars(d.budget)}</div>
          </div>
        </div>
        <div class="cat-bar"><span class="${cls}" style="width:${barW}%"></span></div>
      </div>`;
  }).join('');
}

function renderBuckets() {
  const content = document.getElementById('content');
  const groups = {};
  for (const d of DATA) {
    const b = d.bucket || 'Other';
    if (!groups[b]) groups[b] = { spent: 0, budget: 0, items: [] };
    groups[b].spent += d.spent;
    groups[b].budget += d.budget;
    groups[b].items.push(d);
  }
  const order = ['Housing','Transportation','Food','Subscriptions','Personal','Travel','Lifestyle'];
  content.innerHTML = order.filter(b => groups[b]).map(b => {
    const g = groups[b];
    const pct = g.budget > 0 ? g.spent / g.budget : 0;
    const barW = Math.min(100, pct * 100);
    const cls = pct > 1 ? 'bar-bad' : pct > 0.8 ? 'bar-warn' : 'bar-good';
    return `
      <div class="card">
        <div class="row">
          <div class="name">${b}</div>
          <div class="amounts">
            <div class="spent">${fmtDollars(g.spent)}</div>
            <div class="budget">/ ${fmtDollars(g.budget)}</div>
          </div>
        </div>
        <div class="cat-bar"><span class="${cls}" style="width:${barW}%"></span></div>
      </div>`;
  }).join('');
}

function renderTips() {
  const content = document.getElementById('content');
  const over = DATA.filter(d => d.pct > 1 && d.budget > 0)
                   .sort((a,b) => (b.spent-b.budget) - (a.spent-a.budget));
  const tipsByCat = {
    'Dining out': 'Batch-cook 2 meals Sunday. Typical savings: $150-200/mo.',
    'Groceries': 'Shop from a list. No-list shops cost ~23% more on average.',
    'Car charging  average': 'Charge off-peak (9pm-9am in CA) — often 40-50% cheaper.',
    'Travel': 'Book flights 6-8 weeks out. ~15-20% savings vs. last-minute.',
    'Events & Experiences': 'Cap at 1 paid experience/week. Free picks this weekend: hiking, farmer\'s market.',
    'Shopping': '48-hour rule. Add to cart, wait 2 days. 70% of the time you won\'t want it.',
    'Gifts & Family': 'Calendar reminders for upcoming events — budget ahead, not last-minute.',
    'Alcohol': 'Dry weekdays save $15-25/week with zero social cost.',
    'Coffee': 'A $5/day coffee habit = $1,800/yr. Keep 2-3 days at home.',
  };
  let html = '<div class="card tips-card">';
  if (over.length === 0) {
    html += '<div class="tip"><span class="emoji">✅</span><div>Every category is within budget this month. Consider moving the slack to savings.</div></div>';
  } else {
    over.forEach(d => {
      const tip = tipsByCat[d.category] || `Over by ${fmtDollars(d.spent - d.budget)}. Pause the next planned spend here for 1 week.`;
      html += `<div class="tip"><span class="emoji">💡</span><div><b>${escapeHtml(d.category)}</b> — over by ${fmtDollars(d.spent - d.budget)}.<br><span style="color:var(--muted)">${tip}</span></div></div>`;
    });
  }
  // Global tips
  const totalSpent = DATA.reduce((a,d)=>a+d.spent,0);
  const totalBudget = DATA.reduce((a,d)=>a+d.budget,0);
  if (totalSpent > totalBudget) {
    html += `<div class="tip"><span class="emoji">⚠️</span><div>You're <b>${fmtDollars(totalSpent-totalBudget)}</b> over total budget. Usually only 1-2 categories drive this — fix those and the rest falls in line.</div></div>`;
  }
  html += `<div class="tip"><span class="emoji">📊</span><div>Weekly digest arrives Sunday 9am with personalized tips based on your actual spend.</div></div>`;
  html += '</div>';
  content.innerHTML = html;
}

function switchView(v) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === v));
  render();
}

function fmtDollars(n) {
  const v = Math.round(n);
  return '$' + v.toLocaleString();
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Spinner
const style = document.createElement('style');
style.textContent = '@keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }';
document.head.appendChild(style);

// Auto-refresh every 2 min while app is open
setInterval(() => { if (document.visibilityState === 'visible' && getUrl()) load(); }, 120000);
document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible' && getUrl()) load(); });

load();
</script>
</body>
</html>
